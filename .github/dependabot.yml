version: 2
updates:
  - package-ecosystem: npm
    directory: "/"
    schedule:
      interval: weekly
      day: sunday
    open-pull-requests-limit: 10

  - package-ecosystem: gomod
    directory: "/"
    schedule:
      interval: weekly
      day: sunday
    open-pull-requests-limit: 10

  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
      day: sunday
    open-pull-requests-limit: 10

  - package-ecosystem: docker
    directory: "/"
    schedule:
      interval: weekly
      day: sunday
    open-pull-requests-limit: 10

  - package-ecosystem: docker-compose
    directory: "/"
    schedule:
      interval: weekly
      day: sunday
    open-pull-requests-limit: 10

  - package-ecosystem: docker-compose
    directory: "/.config"
    schedule:
      interval: weekly
      day: sunday
    open-pull-requests-limit: 10

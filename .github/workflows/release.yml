name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Skip GitHub release upload (build/sign/validate only)'
        type: boolean
        default: true
      skip_sign:
        description: 'Skip signing (use for first-time catalog submission before org/prefix is registered)'
        type: boolean
        default: false

permissions:
  contents: write
  id-token: write
  attestations: write

jobs:
  release:
    name: Build, sign, and release
    runs-on: ubuntu-latest
    env:
      GRAFANA_ACCESS_POLICY_TOKEN: ${{ secrets.GRAFANA_ACCESS_POLICY_TOKEN }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '25'
          cache: 'npm'

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Resolve version
        id: version
        # package.json is the single source of truth for the plugin version.
        # On tag push we additionally verify the tag matches package.json so a
        # release can never publish a tag/source-version mismatch.
        run: |
          VERSION=$(jq -r '.version' package.json)
          if [[ "${GITHUB_REF}" == refs/tags/* ]]; then
            TAG_VERSION="${GITHUB_REF#refs/tags/v}"
            if [[ "${TAG_VERSION}" != "${VERSION}" ]]; then
              echo "::error::Tag v${TAG_VERSION} does not match package.json version ${VERSION}. Bump package.json before tagging."
              exit 1
            fi
          fi
          echo "version=${VERSION}" >> "${GITHUB_OUTPUT}"
          echo "today=$(date -u +%Y-%m-%d)" >> "${GITHUB_OUTPUT}"

      - name: Install npm deps
        run: npm ci

      - name: Frontend gates
        run: |
          npm run typecheck
          npm run lint
          npm run test:ci

      - name: Backend tests
        run: go test -race -v ./pkg/... -timeout 300s

      - name: Frontend build
        run: npm run build

      - name: Backend build
        run: |
          go install github.com/magefile/mage@latest
          mage -v

      - name: Stamp plugin.json with version and date
        # plugin.json's version is the same as package.json's; the validator
        # requires them to match. package.json is the source of truth (committed).
        run: |
          jq --arg v "${{ steps.version.outputs.version }}" \
             --arg d "${{ steps.version.outputs.today }}" \
             '.info.version = $v | .info.updated = $d' \
             dist/plugin.json > dist/plugin.json.tmp
          mv dist/plugin.json.tmp dist/plugin.json

      - name: Sign plugin
        # continue-on-error: signing 403s on the first submission because the
        # arcadedb- ID prefix is not yet registered to a grafana.com org. Once
        # Grafana accepts the plugin and entitles the org, signing will succeed
        # and we should remove continue-on-error so failures become loud again.
        if: env.GRAFANA_ACCESS_POLICY_TOKEN != '' && inputs.skip_sign != true
        continue-on-error: true
        run: npx --yes @grafana/sign-plugin@latest

      - name: Package zip
        id: package
        run: |
          PLUGIN_ID=$(jq -r .id dist/plugin.json)
          VERSION="${{ steps.version.outputs.version }}"
          STAGING="$(mktemp -d)/${PLUGIN_ID}"
          mkdir -p "${STAGING}"
          cp -r dist/. "${STAGING}/"
          ZIP_NAME="${PLUGIN_ID}-${VERSION}.zip"
          (cd "$(dirname "${STAGING}")" && zip -r "${GITHUB_WORKSPACE}/${ZIP_NAME}" "${PLUGIN_ID}")
          echo "zip=${ZIP_NAME}" >> "${GITHUB_OUTPUT}"

      - name: Validate plugin
        run: |
          npx --yes @grafana/plugin-validator@latest \
            -sourceCodeUri file://. \
            "${{ steps.package.outputs.zip }}"

      - name: Generate sha1
        run: sha1sum "${{ steps.package.outputs.zip }}" > "${{ steps.package.outputs.zip }}.sha1"

      - name: Attest build provenance
        # Produces a signed SLSA provenance statement for the zip. The validator
        # flags "no provenance attestation" as a recommendation; this satisfies it.
        if: startsWith(github.ref, 'refs/tags/v') && github.event_name == 'push'
        uses: actions/attest-build-provenance@v2
        with:
          subject-path: ${{ steps.package.outputs.zip }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: plugin-${{ steps.version.outputs.version }}
          path: |
            ${{ steps.package.outputs.zip }}
            ${{ steps.package.outputs.zip }}.sha1
          if-no-files-found: error

      - name: Create GitHub release
        if: startsWith(github.ref, 'refs/tags/v') && github.event_name == 'push'
        uses: softprops/action-gh-release@v2
        with:
          files: |
            ${{ steps.package.outputs.zip }}
            ${{ steps.package.outputs.zip }}.sha1
          body_path: CHANGELOG.md
          draft: false
          prerelease: ${{ contains(steps.version.outputs.version, '-') }}
